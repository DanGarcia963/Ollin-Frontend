<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="visited_museums">Mis Visitados</title>
    <script defer src="js/i18n.js"></script>
    <link rel="stylesheet" href="styles/visited.css">
    <link rel="stylesheet" href="styles/navbar.css">
    <link rel="stylesheet" href="/styles/loadingOverlay.css">
    <script src="ARCY-PRUEBAS/admin.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
        <style>
    .scrollbar-hide {
      scrollbar-width: none; /* Firefox */
    }

    .scrollbar-hide::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    /* Mostrar scrollbar solo al hacer hover */
    .hover\\:scrollbar-default:hover {
    scrollbar-width: auto; /* Firefox */
    }

    .hover\\:scrollbar-default:hover::-webkit-scrollbar {
    width: 8px;
    height: 8px;
    }

    .hover\\:scrollbar-default:hover::-webkit-scrollbar-thumb {
    background-color: rgba(0, 0, 0, 0.5);
    border-radius: 4px;
    }

    .hover\\:scrollbar-default:hover::-webkit-scrollbar-track {
    background-color: transparent;
    }
</style>
</head>
<body>
    <header>
        <div class="navbar" >
            <span id="openBtn" class="btn-icon" onclick="openNav()" >&#9776;</span>

            <img src="assets/icons/Logo.PNG" class="img-nav" alt="Logo" id="logoImage">

            <div class="containerlanguages">
                <!-- Selector de idioma -->
                <div class="lang-switcher">
                    <label for="lang-select" data-i18n="label_select_lang">Idioma:</label>
                    <select id="lang-select">
                        <option value="es">Español</option>
                        <option value="en">English</option>
                        <option value="it">Italiano</option>
                        <option value="fr">Frances</option>
                    </select>
                </div>
            </div>
            <!-- Ahora boton de regresar -->
            <button type="button" id="btnTriggerSB" class="btn-icon" onclick="window.location.href='/inicio'">
                <img src="assets/icons/regresar.png" alt="Buscar" class="img-nav">
            </button>
            
            
        </div>

        <div class="container-modal-sidebar" id="modalSidebar">
            <div id="sidebar" class="sidebar">
                <div class="user">
                    <p data-i18n="greeting_hello">Hola, </p><b id="nombreUsuario"> NOMBRE </b> 
                </div>
                <div class="sidebar-text">
                    <a href="/museums" class="btn-sidebar"> 
                        <img src="./assets/icons/museum_icon_white.png" class="sidebar-img"> <span data-i18n="museums">Museos</span>
                    </a>
                    <a href="/aventuras_proximas" class="btn-sidebar"> 
                        <img src="./assets/icons/itinerarioIcono.png" class="sidebar-img"> <span data-i18n="visit_plans">Planes de Visita</span>
                    </a>
                    <a href="/MisFavoritos" class="btn-sidebar"> 
                        <img src="./assets/icons/favoritosBlancoRosa.png" class="sidebar-img"> <span data-i18n="favorite_museums">Museos favoritos</span>
                    </a>
                    <a href="/MisVisitados" class="btn-sidebar"> 
                        <img src="./assets/icons/checked.png" class="sidebar-img"> <span data-i18n="visited_museums">Museos Visitados</span>
                    </a>
                    
                </div>

                <div class="sidebar-text" style="margin-top: auto;">
                    <a href="/perfilTurista" class="btn-sidebar"> 
                        <img src="./assets/icons/engraneIcon.png" class="sidebar-img"> <span data-i18n="account">Cuenta</span>
                    </a>
                    <a href="#" class="btn-sidebar" id="cerrarSesion"> 
                        <img src="./assets/icons/cerrarIcono.png" class="sidebar-img"> <span data-i18n="logout">Cerrar Sesión </span>
                    </a>
                </div>
                <button type="button" id="closeBtn" class="closeBtn btn-icon" onclick="closeNav()">&times;</a>
            </div>
        </div> 
    </header>
<main class="max-w-7xl mx-auto px-4 py-8 flex flex-col w-full overflow-y-auto lg:overflow-hidden lg:h-[calc(100vh-60px)]">
    
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 flex-1 lg:min-h-0">
    
            <section class="flex flex-col gap-4 lg:h-full lg:min-h-0">
    
                <div class="px-6 pt-6 lg:shrink-0">
                    <div class="bg-mauve-900 rounded-xl overflow-hidden shadow-lg border border-mauve-700 p-4">
                        <h1 class="titleAP" data-i18n="my_visited">Mis Visitados</h1>
                    </div>
                </div>
    
                <div id="visides"
                    class="flex flex-row lg:flex-col snap-x snap-mandatory gap-6 px-6 pb-6
                    overflow-x-auto lg:overflow-x-hidden
                    overflow-y-hidden lg:overflow-y-auto
                    flex-1 lg:min-h-0
                    scroll-smooth scrollbar-hide hover:scrollbar-default">
                    </div>
    
                <div id="pagination" class="pagination lg:shrink-0 pb-4">
                    <button id="showMoreBtn" class="pagination-button" style="display: none;">Mostrar más</button>
                    <button id="showLessBtn" class="pagination-button" style="display: none;">Mostrar menos</button>
                </div>
    
            </section>
    
            <section class="flex flex-col gap-4 lg:h-full lg:min-h-0">
    
                <div class="px-6 pt-6 lg:shrink-0">
                    <div class="bg-mauve-900 rounded-xl overflow-hidden shadow-lg border border-mauve-700 p-4">
                        <h1 class="titleAP" data-i18n="visitedPlans">Mis Planes Visitados</h1>
                    </div>
                </div>
    
                <div id="containerItinerarios"
                    class="flex flex-row lg:flex-col snap-x snap-mandatory gap-6 px-6 pb-6
                    overflow-x-auto lg:overflow-x-hidden
                    overflow-y-hidden lg:overflow-y-auto
                    flex-1 lg:min-h-0
                    scroll-smooth scrollbar-hide hover:scrollbar-default">
                    </div>
    
            </section>
    
        </div>
    
        <div id="no-favorites-message" class="hidden text-center mt-8 lg:shrink-0">
            <p data-i18n="no_visited_museums">No hay Museos visitados aún.</p>
            <button data-i18n="add" onclick="window.location.href='/inicio'"
                class="mt-4 px-4 py-2 bg-red-700 rounded-lg text-white font-bold">
                Ir a agregar
            </button>
        </div>
    
        <div id="map" class="hidden"></div>
    
    </main>

    <script src="js/toogle_modal.js"></script>
    <script src="js/expandir.js"></script>
    <script src="js/expandir-weekend.js"></script>
    <script type="module" src="js/jquery-3.7.1.min.js"></script>
    <script src="js/botones.js"></script>
    <script type="module" src="ARCY-imports/lugarVisitado.js"></script>
    <script src="js/goinit.js"></script>
    <script src="js/i18n.js"></script>
    <script type="module" src="js/visdes.js"></script> <!-- Tu archivo JavaScript que maneja la lógica -->
    <script src="js/jquery-3.7.1.min.js"></script>
    <script src="js/map.js"></script>
    <script src="//cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>
</html>
